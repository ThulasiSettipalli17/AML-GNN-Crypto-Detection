<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AML Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Crypto AML Detection</h1>
            <p>Advanced Anti-Money Laundering System using RF and GNN</p>
            <div class="nav">
                <a href="/" class="active">Home</a>
                <a href="/dashboard">Dashboard</a>
            </div>
        </header>

        <section class="predictor">
            <div class="card">
                <h2>Transaction Analysis</h2>
                <div class="grid-4x4" id="inputForm">
                    <div class="input-group">
                        <label>Amount (USD)</label>
                        <input type="number" id="Amount" value="5000" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Sender Balance</label>
                        <input type="number" id="Sender_Balance" value="10000">
                    </div>
                    <div class="input-group">
                        <label>Receiver Balance</label>
                        <input type="number" id="Receiver_Balance" value="200">
                    </div>
                    <div class="input-group">
                        <label>Tx Frequency (per hr)</label>
                        <input type="number" id="Tx_Freq" value="5">
                    </div>
                    <div class="input-group">
                        <label>Hop Count</label>
                        <input type="number" id="Hop_Count" value="2">
                    </div>
                    <div class="input-group">
                        <label>Time Delta (mins)</label>
                        <input type="number" id="Time_Delta" value="15">
                    </div>
                    <div class="input-group">
                        <label>Is Mixing (0/1)</label>
                        <input type="number" id="Is_Mixing" value="1" min="0" max="1">
                    </div>
                    <div class="input-group">
                        <label>Network Centrality</label>
                        <input type="number" id="Network_Centrality" value="0.8" step="0.01">
                    </div>
                </div>
                <button class="btn-predict" onclick="predict()">Analyze Transaction</button>
            </div>

            <div id="result" class="result-card hidden">
                <h3>Analysis Results</h3>
                <div class="result-grid">
                    <div class="res-box">
                        <span class="label">Random Forest</span>
                        <div id="rfResult" class="value"></div>
                    </div>
                    <div class="res-box">
                        <span class="label">GNN Model</span>
                        <div id="gnnResult" class="value"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        async function predict() {
            const inputs = ['Amount', 'Sender_Balance', 'Receiver_Balance', 'Tx_Freq', 'Hop_Count', 'Time_Delta', 'Is_Mixing', 'Network_Centrality'];
            const data = {};
            inputs.forEach(id => {
                data[id] = document.getElementById(id).value;
            });

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            document.getElementById('result').classList.remove('hidden');
            
            const rfEl = document.getElementById('rfResult');
            const gnnEl = document.getElementById('gnnResult');
            
            rfEl.innerText = result.rf_result;
            gnnEl.innerText = result.gnn_result;
            
            rfEl.className = 'value ' + (result.rf_raw === 1 ? 'bad' : 'good');
            gnnEl.className = 'value ' + (result.gnn_raw === 1 ? 'bad' : 'good');
        }
    </script>
</body>
</html>
